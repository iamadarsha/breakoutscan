services:
  - type: web
    name: breakoutscan-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: REDIS_URL
        fromService:
          type: redis
          name: breakoutscan-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: breakoutscan-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /health

  - type: redis
    name: breakoutscan-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  - name: breakoutscan-db
    plan: free
    databaseName: stockdb
    user: breakout
