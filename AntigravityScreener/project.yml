name: AntigravityScreener
options:
  bundleIdPrefix: com.antigravity
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.3"
settings:
  base:
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_UIUserInterfaceStyle: Dark
targets:
  AntigravityScreener:
    type: application
    platform: iOS
    sources:
      - AntigravityScreener
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antigravity.screener
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: "UW23XR9FK2"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Equifidy
    info:
      path: AntigravityScreener/Info.plist
      properties:
        CFBundleDisplayName: Equifidy
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UILaunchScreen: {}
